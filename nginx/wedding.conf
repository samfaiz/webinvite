# Host nginx reverse proxy. Place at /etc/nginx/sites-available/wedding.conf,
# symlink into sites-enabled, then run: sudo certbot --nginx -d your-domain.com
# (certbot rewrites this to add the HTTPS/443 server block and redirect).
#
# Routing on one domain:
#   /          -> Next.js frontend (127.0.0.1:3000)
#   /api/      -> NestJS API       (127.0.0.1:4000)
#   /uploads/  -> NestJS static     (127.0.0.1:4000)  photos / video / music

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # allow large invitations (base64 photos + video) — keep in sync with the API body limit
    client_max_body_size 300M;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
